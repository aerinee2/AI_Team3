<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeEat Korea</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #222;
            --accent: #00e5a0;
            --accent-dim: rgba(0, 229, 160, 0.12);
            --warn: #ff5c5c;
            --text: #f0f0f0;
            --muted: #666;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }
        .container { width: 100%; max-width: 480px; position: relative; z-index: 1; }
        .header { text-align: center; margin-bottom: 40px; animation: fadeDown 0.6s ease both; }
        .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2.4rem; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        .tagline { margin-top: 8px; font-size: 0.85rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 36px; animation: fadeUp 0.6s ease 0.1s both; }
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 14px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--accent);
            background: var(--accent-dim);
        }
        .upload-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
        .upload-icon { font-size: 2.8rem; margin-bottom: 14px; display: block; transition: transform 0.25s ease; }
        .upload-zone:hover .upload-icon { transform: scale(1.1); }
        .upload-title { font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 700; margin-bottom: 6px; }
        .upload-sub { font-size: 0.8rem; color: var(--muted); }
        .preview-img { display: none; width: 100%; max-height: 220px; object-fit: cover; border-radius: 10px; margin-top: 16px; }
        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 28px 0; color: var(--muted);
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em;
        }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .btn {
            width: 100%; padding: 16px;
            background: var(--accent); color: #000;
            border: none; border-radius: 12px;
            font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
            cursor: pointer; letter-spacing: 0.04em;
            transition: all 0.2s ease;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,229,160,0.3); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .btn .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.3); border-top-color: #000; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
        .btn.loading .btn-text { display: none; }
        .btn.loading .spinner { display: block; }
        .note { text-align: center; margin-top: 20px; font-size: 0.75rem; color: var(--muted); animation: fadeUp 0.6s ease 0.2s both; }
        .note span { color: var(--warn); }
        @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">Safe<span>Eat</span> Korea</div>
            <p class="tagline">AI-powered food label scanner for travelers</p>
        </div>
        <div class="card">
            <form action="/analyze" method="post" enctype="multipart/form-data" id="scanForm">
                <div class="upload-zone" id="uploadZone">
                    <input type="file" name="file" accept="image/*" capture="camera" required id="fileInput">
                    <span class="upload-icon">📷</span>
                    <div class="upload-title">Take a photo or upload</div>
                    <div class="upload-sub">Point your camera at the ingredient label</div>
                </div>
                <img class="preview-img" id="previewImg" alt="Preview">
                <div class="divider">then</div>
                <button class="btn" type="submit" id="submitBtn" disabled>
                    <span class="btn-text">Scan & Analyze</span>
                    <div class="spinner"></div>
                </button>
            </form>
        </div>
        <p class="note"><span>⚠️</span> For reference only. Always consult a medical professional for allergy concerns.</p>
    </div>
    <script>
        const fileInput = document.getElementById('fileInput');
        const previewImg = document.getElementById('previewImg');
        const submitBtn = document.getElementById('submitBtn');
        const uploadZone = document.getElementById('uploadZone');
        const scanForm = document.getElementById('scanForm');

        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0];
            if (!file) return;
            previewImg.src = URL.createObjectURL(file);
            previewImg.style.display = 'block';
            submitBtn.disabled = false;
            uploadZone.style.borderColor = 'var(--accent)';
            uploadZone.style.background = 'var(--accent-dim)';
        });
        scanForm.addEventListener('submit', () => {
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
        });
        uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
        uploadZone.addEventListener('drop', e => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) {
                const dt = new DataTransfer();
                dt.items.add(file);
                fileInput.files = dt.files;
                fileInput.dispatchEvent(new Event('change'));
            }
        });
    </script>
</body>
</html>
